name: Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to smoke (e.g. https://thethaomammo.vercel.app)"
        required: true
  deployment_status: {}

jobs:
  smoke:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success' }}
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || github.event.deployment_status.target_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke
        run: pnpm exec playwright test tests/smoke --config=playwright.smoke.config.ts
